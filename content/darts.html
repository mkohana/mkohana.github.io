<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title></title>
<style type="text/css">
span.choice {
  font-size:xx-large;
}
</style>
  </head>

  <body>
    <div><h1 id="target"></h1></div>
    <div>
      <span id="c1" class="choice"></span>
      <span id="c2" class="choice"></span>
      <span id="c3" class="choice"></span>
    </div>
    <h1 id="result"></h1>
    <button id="gen">Generate</button>
    <hr>
    <div id="bull"></div>
    <div id="single"></div>
    <div id="double"></div>
    <div id="triple"></div>

    <script>
      var t = 0;
      var count = 0;
      var select = new Array(3);
      g = document.getElementById("gen");
      g.addEventListener("click", function(e) {
        t = Math.round(Math.random() * 177 + 3);
        document.getElementById("target").innerHTML = t;
        count = 0;
        select = new Array(3);
        document.getElementById("c1").innerHTML = "";
        document.getElementById("c2").innerHTML = "";
        document.getElementById("c3").innerHTML = "";
        document.getElementById("result").innerHTML = "";
        return 0;
      });

      function selectNum(e) {
        v = e.target.value;
        select[count] = v;
        count++;
        document.getElementById("c" + count).innerHTML = v;

        if (count == 3) {
          sum = 0;
          for (i=0; i<3; i++) {
            sum += Number(select[i]);
          }
          if (sum == t) {
            document.getElementById("result").innerHTML = "clear";
          } else {
            document.getElementById("result").innerHTML = "KEEP TRY";
          }
        }

        return 0;
      }

      b = document.createElement("button");
      b.innerHTML = "BULL";
      b.value = 50;
      b.addEventListener("click", selectNum);
      document.getElementById("bull").appendChild(b);
      for (i=1; i<=20; i++) {
        b = document.createElement("button");
        b.innerHTML = "S" + i;
        b.value = i;
        b.addEventListener("click", selectNum);
        document.getElementById("single").appendChild(b);

        b = document.createElement("button");
        b.innerHTML = "D" + i;
        b.value = i * 2;
        b.addEventListener("click", selectNum);
        document.getElementById("double").appendChild(b);

        b = document.createElement("button");
        b.innerHTML = "T" + i;
        b.value = i * 3;
        b.addEventListener("click", selectNum);
        document.getElementById("triple").appendChild(b);

      }
    </script>
  </body>
</html>
